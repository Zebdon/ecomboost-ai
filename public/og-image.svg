<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fondo oscuro -->
  <rect width="1200" height="630" fill="#1C1A17"/>

  <!-- Patrón de puntos sutil -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8642A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1C1A17" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="600" height="630" fill="url(#glow)"/>

  <!-- Acento naranja izquierda -->
  <rect x="0" y="0" width="5" height="630" fill="#E8642A"/>

  <!-- Badge top -->
  <rect x="72" y="72" width="200" height="32" rx="16" fill="#E8642A" opacity="0.15"/>
  <rect x="72" y="72" width="200" height="32" rx="16" fill="none" stroke="#E8642A" stroke-width="1" opacity="0.4"/>
  <text x="172" y="93" text-anchor="middle" fill="#E8642A" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700">⚡ Early Bird — $29</text>

  <!-- Logo / Marca -->
  <text x="72" y="210" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Ecom</text>
  <text x="312" y="210" fill="#E8642A" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Boost</text>
  <text x="582" y="210" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" letter-spacing="-2"> AI</text>

  <!-- Subtítulo -->
  <text x="72" y="270" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="400">5 herramientas de IA para lanzar y escalar tu tienda online</text>

  <!-- Divider -->
  <rect x="72" y="310" width="80" height="3" rx="2" fill="#E8642A"/>

  <!-- Las 5 herramientas -->
  <g transform="translate(72, 350)">
    <!-- Ads -->
    <rect width="180" height="80" rx="12" fill="#ffffff" opacity="0.05"/>
    <rect width="180" height="80" rx="12" fill="none" stroke="#f0c5ab" stroke-width="1"/>
    <text x="90" y="32" text-anchor="middle" font-size="22">📣</text>
    <text x="90" y="54" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Creador de Ads</text>
    <text x="90" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="10">Multi-canal</text>

    <!-- SEO -->
    <rect x="196" width="180" height="80" rx="12" fill="#ffffff" opacity="0.05"/>
    <rect x="196" width="180" height="80" rx="12" fill="none" stroke="#c2dbf0" stroke-width="1"/>
    <text x="286" y="32" text-anchor="middle" font-size="22">🔍</text>
    <text x="286" y="54" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Generador SEO</text>
    <text x="286" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="10">Descripción de producto</text>

    <!-- Nicho -->
    <rect x="392" width="180" height="80" rx="12" fill="#ffffff" opacity="0.05"/>
    <rect x="392" width="180" height="80" rx="12" fill="none" stroke="#c2e2c9" stroke-width="1"/>
    <text x="482" y="32" text-anchor="middle" font-size="22">📊</text>
    <text x="482" y="54" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Analizador de Nicho</text>
    <text x="482" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="10">Valida tu idea</text>

    <!-- Branding -->
    <rect x="588" width="180" height="80" rx="12" fill="#ffffff" opacity="0.05"/>
    <rect x="588" width="180" height="80" rx="12" fill="none" stroke="#d9cdf0" stroke-width="1"/>
    <text x="678" y="32" text-anchor="middle" font-size="22">🎨</text>
    <text x="678" y="54" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Branding Instantáneo</text>
    <text x="678" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="10">Nombre y slogan</text>

    <!-- Launch -->
    <rect x="784" width="180" height="80" rx="12" fill="#ffffff" opacity="0.05"/>
    <rect x="784" width="180" height="80" rx="12" fill="none" stroke="#f0dba8" stroke-width="1"/>
    <text x="874" y="32" text-anchor="middle" font-size="22">🚀</text>
    <text x="874" y="54" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Plan de Lanzamiento</text>
    <text x="874" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="10">Paso a paso</text>
  </g>

  <!-- URL bottom -->
  <text x="72" y="580" fill="#6b7280" font-family="system-ui,sans-serif" font-size="16">ecomboost-ai-gamma.vercel.app</text>

  <!-- Precio badge derecha -->
  <rect x="980" y="480" width="148" height="72" rx="16" fill="#E8642A"/>
  <text x="1054" y="515" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Pago único</text>
  <text x="1054" y="545" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="32" font-weight="900">$29</text>
</svg>
